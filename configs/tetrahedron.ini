; Smallest possible closed triangle mesh. Hand-checkable topology and
; fundamental forms make this the best starting point while debugging.
[simulation]
mesh=meshes/tetrahedron.obj
thickness=1e-4
young=2e9
poisson=0.3
density=250
viscosity=5e-13
mu=0.0025
mu_perp=0.001
diffusivity=1e-7
dt=1e-4
gravity_x=0
gravity_y=0
gravity_z=0
