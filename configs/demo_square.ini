; Checkpoint demo: "Swelling of a Square" (paper Table 2 row 1).
; Flat triangulated square in the xz plane. Press G to cycle the
; isotropic growth factor (1.0 -> 1.5 -> 2.0). The mesh expands
; uniformly to minimize the Koiter stretching energy.
;
; Material is intentionally soft (E ~ 1e4) so explicit symplectic
; Euler is stable at dt = 1e-3 without an implicit solver.
[simulation]
mesh=meshes/flat_square.obj
thickness=1e-2
young=1e4
poisson=0.3
density=100
viscosity=0
mu=0
mu_perp=0
diffusivity=0
dt=0.01
damping=4.0
verify_forces=false
gravity_x=0
gravity_y=0
gravity_z=0
