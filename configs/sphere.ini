; Closed sphere. Useful for validating that a strain-free curved mesh
; stays at rest when a_bar and b_bar are initialized from its geometry.
[simulation]
mesh=meshes/sphere.obj
thickness=1e-4
young=2e9
poisson=0.3
density=250
viscosity=5e-13
mu=0.0025
mu_perp=0.001
diffusivity=1e-7
dt=1e-4
gravity_x=0
gravity_y=0
gravity_z=0
