; Disk-to-sphere demo (paper Figure 3, Section 7.1).
; Implicit Euler with Newton's method — stable at large dt and
; with realistic material stiffness.
[simulation]
mesh=meshes/flat_disk.obj
rest_metric=stereographic
thickness=0.01
young=2e9
poisson=0.3
density=250
viscosity=0
mu=0
mu_perp=0
diffusivity=0
dt=0.01
damping=5
growth_rate=0.3
gravity_x=0
gravity_y=0
gravity_z=0
verify_forces=false
