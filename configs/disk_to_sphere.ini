; Disk-to-sphere demo (paper Figure 3, Section 7.1).
; Sphere of radius 1/4 via inverse stereographic projection.
; Paper Table 1 defaults for ordinary paper.
[simulation]
mesh=meshes/flat_disk.obj
rest_metric=stereographic
thickness=0.1
young=2e9
poisson=0.3
density=250
eta=5e-13
dt=0.01
growth_rate=0.3
gravity_x=0
gravity_y=0
gravity_z=0
verify_forces=false
