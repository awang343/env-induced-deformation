; Flat sheet of paper. Ideal test case for moisture-induced curling
; (paper Fig. 6): set a non-zero m_plus on one side and watch it roll.
[simulation]
mesh=meshes/rectangle.obj
thickness=1e-4
young=2e9
poisson=0.3
density=250
viscosity=5e-13
mu=0.0025
mu_perp=0.001
diffusivity=1e-7
dt=1e-4
gravity_x=0
gravity_y=-9.81
gravity_z=0
