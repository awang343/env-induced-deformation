; Plastic bunny shrinking under localized heating (paper Fig. 5).
; Treat m_plus / m_minus as temperature rather than moisture.
[simulation]
mesh=meshes/bunny.obj
thickness=5e-4
young=5e8
poisson=0.35
density=1200
viscosity=1e-12
mu=-0.01
mu_perp=-0.01
diffusivity=1e-6
dt=1e-4
gravity_x=0
gravity_y=-9.81
gravity_z=0
