mesh=meshes/flat_disk.obj
rest_metric=swelling_linear
thickness=1e-2
young=2e9
poisson=0.3
density=250
dt=2
moisture=none
diffusivity=1e-8

[rest_metric]
seed=42
perturb=0
mu=1e-2
