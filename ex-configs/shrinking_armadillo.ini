; Isotropic shrinking of complex armadillo.
; growth_factor < 1 makes the rest metric smaller than current → shell contracts.
[simulation]
mesh=meshes/complex_armadillo.obj
rest_metric=isotropic_growth
thickness=0.5
young=3e10
poisson=0.2
density=250
dt=0.0001

[rest_metric]
seed=42
perturb=0.01
growth_factor=0.7
